<header
  class="fixed top-0 left-0 lg:left-64 right-0 h-16 bg-[color-mix(in_srgb,var(--color-bg-base)_80%,transparent)] backdrop-blur-md border-b border-[var(--color-border)] flex items-center justify-between px-4 sm:px-6 z-30 transition-[left] duration-300"
>
  <div class="flex items-center gap-3 min-w-0">
    <button
      type="button"
      class="lg:hidden p-2 rounded-lg border border-[var(--color-border)] text-[var(--color-text-muted)] hover:text-[var(--color-text)] hover:bg-[var(--color-surface-muted)]"
      aria-label="Abrir menu"
      (click)="layout.alternarSidebar()"
    >
      <lucide-icon [img]="menuIcon" class="w-5 h-5" />
    </button>

    @if (authService.organizacaoAtual()) {
      <div
        class="flex items-center gap-2 bg-[var(--color-surface-muted)] border border-[var(--color-border)] rounded-lg px-3 py-1.5 min-w-0"
      >
        <span class="w-2 h-2 bg-[var(--color-success)] rounded-full animate-pulse flex-shrink-0"></span>
        <span class="text-[var(--color-text)] text-sm font-medium truncate">
          {{ authService.organizacaoAtual() }}
        </span>
      </div>
    } @else if (authService.isSuperAdmin()) {
      <div
        class="flex items-center gap-2 bg-[var(--color-accent-soft)] border border-[var(--color-primary)] rounded-lg px-3 py-1.5"
      >
        <span class="w-2 h-2 bg-[var(--color-primary-soft)] rounded-full"></span>
        <span class="text-[var(--color-primary-soft)] text-sm font-medium">Super Admin</span>
      </div>
    }
  </div>

  <div class="flex items-center gap-4">
    <div class="text-right hidden sm:block">
      <p class="text-[var(--color-text)] text-sm font-medium leading-none">
        {{ authService.nomeUsuario() ?? '...' }}
      </p>
      <p class="text-[var(--color-text-subtle)] text-xs mt-0.5">
        {{ authService.emailUsuario() ?? '' }}
      </p>
    </div>

    <div class="w-8 h-8 bg-[var(--color-primary)] rounded-full flex items-center justify-center">
      <span class="text-xs font-bold text-[var(--color-text)]">
        {{ (authService.nomeUsuario() ?? 'U')[0].toUpperCase() }}
      </span>
    </div>
  </div>
</header>
