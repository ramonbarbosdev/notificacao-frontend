<div
  class="bg-[var(--color-surface)] border rounded-2xl p-5 transition-all duration-200 hover:border-[var(--color-border-strong)]"
  [class.border-[var(--color-success-border)]]="whatsappStatus?.conectado"
  [class.border-[var(--color-border)]]="!whatsappStatus?.conectado"
>
  <div class="flex items-start justify-between mb-4">
    <div
      class="w-10 h-10 rounded-xl flex items-center justify-center"
      [class.bg-[var(--color-success-bg)]]="whatsappStatus?.conectado"
      [class.bg-[var(--color-surface-muted)]]="!whatsappStatus?.conectado"
    >
      <lucide-icon
        [img]="whatsappIcon"
        class="w-5 h-5"
        [class.text-[var(--color-success)]]="whatsappStatus?.conectado"
        [class.text-[var(--color-text-subtle)]]="!whatsappStatus?.conectado"
      />
    </div>

    <span
      class="text-xs px-2 py-0.5 rounded-full border font-medium"
      [class.bg-[var(--color-success-bg)]]="whatsappStatus?.conectado"
      [class.text-[var(--color-success)]]="whatsappStatus?.conectado"
      [class.border-[var(--color-success-border)]]="whatsappStatus?.conectado"
      [class.bg-[var(--color-surface-muted)]]="!whatsappStatus?.conectado"
      [class.text-[var(--color-text-muted)]]="!whatsappStatus?.conectado"
      [class.border-[var(--color-border)]]="!whatsappStatus?.conectado"
    >
      {{ whatsappStatus?.conectado ? 'Online' : 'Offline' }}
    </span>
  </div>

  <p class="text-[var(--color-text-muted)] text-xs uppercase tracking-widest mb-1">
    WhatsApp status
  </p>

  <p class="text-[var(--color-text)] font-semibold text-lg">
    {{ whatsappStatus?.status ?? (carregandoStatus ? '...' : 'Desconhecido') }}
  </p>

  @if (whatsappStatus?.telefone) {
    <p class="text-[var(--color-text-subtle)] text-xs mt-1 truncate">
      {{ whatsappStatus!.telefone }}
    </p>
  }
</div>
