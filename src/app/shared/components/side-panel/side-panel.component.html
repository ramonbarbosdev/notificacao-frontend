@if (open) {
  <div class="fixed inset-0 z-50">
    <div
      class="absolute inset-0 bg-black/50 backdrop-blur-sm"
      (click)="close()">
    </div>

    <aside
      class="absolute right-0 top-0 h-full w-full bg-[var(--color-surface)] border-l border-[var(--color-border)] shadow-2xl flex flex-col"
      [class]="widthClass">

      <header class="px-6 py-5 border-b border-[var(--color-border)] flex items-start justify-between gap-4">
        <div>
          <h2 class="text-lg font-semibold text-[var(--color-text)]">
            {{ title }}
          </h2>

          @if (description) {
            <p class="text-sm text-[var(--color-text-muted)] mt-1">
              {{ description }}
            </p>
          }
        </div>

        <button
          type="button"
          (click)="close()"
          class="w-9 h-9 rounded-xl border border-[var(--color-border)] flex items-center justify-center text-[var(--color-text-muted)] hover:text-[var(--color-text)]">
          <lucide-icon [img]="closeIcon" class="w-4 h-4" />
        </button>
      </header>

      <section class="flex-1 overflow-y-auto p-6">
        <ng-content />
      </section>
    </aside>
  </div>
}
