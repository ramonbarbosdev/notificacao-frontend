<a
  [routerLink]="routerLink"
  class="group bg-[var(--color-surface)] border border-[var(--color-border)] hover:border-[var(--color-primary)] rounded-2xl p-6 flex items-center gap-5 transition-all duration-200 hover:bg-[var(--color-surface-muted)]"
>
  <div
    class="w-12 h-12 rounded-xl flex items-center justify-center transition-colors flex-shrink-0"
    [class.bg-[var(--color-success-bg)]]="tone === 'success'"
    [class.group-hover:bg-[var(--color-success-border)]]="tone === 'success'"
    [class.bg-[var(--color-accent-soft)]]="tone !== 'success'"
  >
    <lucide-icon
      [img]="icon"
      class="w-6 h-6"
      [class.text-[var(--color-success)]]="tone === 'success'"
      [class.text-[var(--color-primary-soft)]]="tone !== 'success'"
    />
  </div>

  <div>
    <h3 class="text-[var(--color-text)] font-semibold">
      {{ title }}
    </h3>

    <p class="text-[var(--color-text-subtle)] text-sm mt-0.5">
      {{ description }}
    </p>
  </div>

  <lucide-icon
    [img]="chevronIcon"
    class="w-5 h-5 ml-auto flex-shrink-0 text-[var(--color-text-faint)] group-hover:text-[var(--color-primary-soft)] transition-colors"
  />
</a>
