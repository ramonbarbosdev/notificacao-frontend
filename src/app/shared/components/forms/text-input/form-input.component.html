<div>
  <label class="block text-sm font-medium text-[var(--color-text-muted)] mb-2">
    {{ label() }}
  </label>

  <input
    [formControl]="control()"
    [type]="type()"
    [placeholder]="placeholder()"
    (input)="inputChanged.emit($event)"
    class="w-full bg-[var(--color-surface-muted)] border border-[var(--color-border-strong)] rounded-xl px-4 py-3 text-[var(--color-text)] placeholder:text-[var(--color-text-subtle)] text-sm focus:outline-none focus:ring-2 focus:ring-[var(--color-primary)] focus:border-transparent"
  />

  @if (helper()) {
    <p class="text-[var(--color-text-subtle)] text-xs mt-1">
      {{ helper() }}
    </p>
  }

  @if (error()) {
    <p class="text-[var(--color-danger)] text-xs mt-1">
      {{ error() }}
    </p>
  }
</div>
