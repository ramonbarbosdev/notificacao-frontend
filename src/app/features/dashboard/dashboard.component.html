<div class="mb-8">
  <h1 class="text-2xl font-bold text-[var(--color-text)]">
    {{ saudacao() }}, {{ primeiroNome() }}
  </h1>

  <p class="text-[var(--color-text-muted)] text-sm mt-1">
    Visão operacional da fila de notificações da organização.
  </p>
</div>

<div class="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-3 gap-5 mb-8">
  <app-whatsapp-status-card
    [whatsappStatus]="whatsappStatus()"
    [carregandoStatus]="carregandoStatus()"
    [whatsappIcon]="whatsappIcon"
  />

  @for (metrica of metricas; track metrica.title) {
    <app-metric-card
      [title]="metrica.title"
      [description]="metrica.description"
      [icon]="metrica.icon"
      [tone]="metrica.tone"
      [value]="valorMetrica(metrica.status)"
      [label]="'na fila'"
      [loading]="carregandoMetricas()"
    />
  }
</div>

<div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-4 gap-5">
  @for (action of quickActions; track action.routerLink) {
    <app-quick-action-card
      [title]="action.title"
      [description]="action.description"
      [routerLink]="action.routerLink"
      [icon]="action.icon"
      [tone]="action.tone ?? 'default'"
      [chevronIcon]="chevronRightIcon"
    />
  }
</div>
