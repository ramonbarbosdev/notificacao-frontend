      <div class="mb-8">
        <h1 class="text-2xl font-bold text-[var(--color-text)]">Feature Flags</h1>
        <p class="text-[var(--color-text-muted)] text-sm mt-1">Habilite recursos por organizacao.</p>
      </div>

      @if (erro()) {
        <div class="mb-6 bg-[var(--color-danger-bg)] border border-[var(--color-danger-border)] rounded-xl px-4 py-3">
          <p class="text-[var(--color-danger)] text-sm">{{ erro() }}</p>
        </div>
      }
      @if (sucesso()) {
        <div class="mb-6 bg-[var(--color-success-bg)] border border-[var(--color-success-border)] rounded-xl px-4 py-3">
          <p class="text-[var(--color-success)] text-sm">{{ sucesso() }}</p>
        </div>
      }

      <section class="bg-[var(--color-surface)] border border-[var(--color-border)] rounded-2xl p-6">
        <label class="block text-sm font-medium text-[var(--color-text-muted)] mb-2">Organizacao</label>
        <select class="form-input-admin mb-6" [value]="idOrganizacao() ?? ''" (change)="selecionarOrganizacao($event)">
          <option value="">Selecione uma organizacao</option>
          @for (org of organizacoes(); track org.idOrganizacao) {
            <option [value]="org.idOrganizacao">{{ org.nmOrganizacao }}</option>
          }
        </select>

        @if (idOrganizacao()) {
          <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
            @for (recurso of recursos; track recurso) {
              <button
                type="button"
                (click)="alternar(recurso)"
                class="border rounded-2xl p-5 text-left transition-colors"
                [class.border-[var(--color-success-border)]]="features()[recurso]"
                [class.bg-[var(--color-success-bg)]]="features()[recurso]"
                [class.border-[var(--color-border)]]="!features()[recurso]"
                [class.bg-[var(--color-surface-muted)]]="!features()[recurso]"
              >
                <div class="flex items-center justify-between gap-3">
                  <div class="flex items-center gap-3">
                    <lucide-icon [img]="flagIcon" class="w-5 h-5 text-[var(--color-primary-soft)]" />
                    <span class="text-[var(--color-text)] font-semibold">{{ recurso }}</span>
                  </div>
                  <span class="text-xs font-semibold" [class.text-[var(--color-success)]]="features()[recurso]" [class.text-[var(--color-text-muted)]]="!features()[recurso]">
                    {{ features()[recurso] ? 'Habilitado' : 'Desabilitado' }}
                  </span>
                </div>
              </button>
            }
          </div>

          <div class="flex justify-end mt-6">
            <button type="button" (click)="salvar()" [disabled]="salvando()" class="px-4 py-3 rounded-xl bg-[var(--color-primary)] disabled:opacity-50 text-[var(--color-bg-base)] text-sm font-semibold flex items-center gap-2">
              @if (salvando()) {
                <lucide-icon [img]="loaderIcon" class="w-4 h-4 animate-spin" />
              } @else {
                <lucide-icon [img]="checkIcon" class="w-4 h-4" />
              }
              Salvar features
            </button>
          </div>
        }
      </section>
