      <div class="mb-8">
        <h1 class="text-2xl font-bold text-[var(--color-text)]">Monitoramento</h1>
        <p class="text-[var(--color-text-muted)] text-sm mt-1">Status tecnico exposto pela API.</p>
      </div>

      <section class="bg-[var(--color-surface)] border border-[var(--color-border)] rounded-2xl p-6">
        <div class="flex items-center gap-3 mb-4">
          <lucide-icon [img]="activityIcon" class="w-5 h-5 text-[var(--color-primary-soft)]" />
          <h2 class="text-[var(--color-text)] font-semibold">/admin/status</h2>
        </div>

        @if (erro()) {
          <p class="text-[var(--color-danger)] text-sm">{{ erro() }}</p>
        } @else {
          <pre class="bg-[var(--color-bg-base)] border border-[var(--color-border)] rounded-xl p-4 text-xs text-[var(--color-text-muted)] overflow-auto">{{ status() | json }}</pre>
        }
      </section>
