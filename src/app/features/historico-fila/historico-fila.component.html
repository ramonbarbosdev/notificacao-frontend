<div class="mb-8 flex flex-col sm:flex-row sm:items-start justify-between gap-4">
        <div>
          <h1 class="text-2xl font-bold text-[var(--color-text)]">Histórico / Fila</h1>
          <p class="text-[var(--color-text-muted)] text-sm mt-1">
            Acompanhe tentativas, bloqueios e reprocessamentos da fila.
          </p>
        </div>

        <button
          type="button"
          (click)="carregarFila()"
          [disabled]="table.loading()"
          class="px-4 py-3 rounded-xl border border-[var(--color-border)] text-[var(--color-text-muted)]
                 hover:text-[var(--color-text)] hover:bg-[var(--color-surface)]
                 disabled:opacity-50 disabled:cursor-not-allowed transition-colors text-sm flex items-center gap-2">
          <lucide-icon
            [img]="table.loading() ? loaderIcon : refreshIcon"
            class="w-4 h-4"
            [class.animate-spin]="table.loading()" />
          Atualizar
        </button>
      </div>

      <div class="mb-6 bg-[var(--color-surface)] border border-[var(--color-border)] rounded-2xl px-6 py-4 flex items-center gap-3">
        <div class="w-10 h-10 bg-[var(--color-accent-soft)] rounded-xl flex items-center justify-center">
          <lucide-icon [img]="clockIcon" class="w-5 h-5 text-[var(--color-primary-soft)]" />
        </div>

        <div>
          <h2 class="text-[var(--color-text)] font-semibold">Fila de notificações</h2>
          <p class="text-[var(--color-text-subtle)] text-xs">
            Atualize para ver o status mais recente dos envios.
          </p>
        </div>
      </div>

      @if (erro()) {
        <div class="mb-6 bg-[var(--color-danger-bg)] border border-[var(--color-danger-border)] rounded-xl px-4 py-3">
          <p class="text-[var(--color-danger)] text-sm">{{ erro() }}</p>
        </div>
      }

      <app-data-table
        [columns]="columns"
        [items]="itensPaginados()"
        [loading]="table.loading()"
        [page]="table.paginaAtual()"
        [pageSize]="table.tamanhoPagina()"
        [totalElements]="totalElementos()"
        [totalPages]="totalPaginas()"
        (filterChange)="aplicarFiltros($event)"
        (nextPage)="proximaPagina()"
        (previousPage)="paginaAnterior()"
        (pageSizeChange)="alterarTamanhoPagina($event)" />
