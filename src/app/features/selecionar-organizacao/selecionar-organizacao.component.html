<div class="min-h-screen bg-[var(--color-bg-base)] flex items-center justify-center p-4">

  <!-- Glow background -->
  <div class="absolute inset-0 overflow-hidden pointer-events-none">
    <div class="absolute top-1/3 left-1/2 -translate-x-1/2 -translate-y-1/2
                w-[500px] h-[500px]
                bg-[var(--color-primary)]/10
                rounded-full blur-3xl">
    </div>
  </div>

  <div class="relative w-full max-w-lg">

    <!-- Header -->
    <div class="text-center mb-8">

      <h1 class="text-xl font-bold text-[var(--color-text)]">
        Selecione a Organização
      </h1>

      <p class="text-[var(--color-text-muted)] text-sm mt-1">
        Escolha para qual organização deseja acessar
      </p>
    </div>

    <!-- Lista -->
    <div class="space-y-3">

      @for (org of authService.organizacoes(); track org.idOrganizacao) {

        <button
          (click)="selecionar(org)"
          [disabled]="carregando() === org.idOrganizacao"

          class="w-full group
                 bg-[var(--color-surface)]
                 hover:bg-[var(--color-surface-muted)]
                 border border-[var(--color-border)]
                 hover:border-[var(--color-primary)]/50
                 rounded-xl p-4 text-left
                 transition-all duration-200
                 disabled:opacity-60
                 disabled:cursor-not-allowed">

          <div class="flex items-center justify-between">

            <!-- Info -->
            <div>

              <p class="text-[var(--color-text)]
                        font-medium text-sm
                        group-hover:text-[var(--color-primary-soft)]
                        transition-colors">

                {{ org.nmOrganizacao }}
              </p>

            </div>

            <!-- Right -->
            <div class="flex items-center gap-3">

              <span class="px-2 py-0.5
                           bg-[var(--color-success-bg)]
                           text-[var(--color-success)]
                           text-xs rounded-full
                           border border-[var(--color-success-border)]">

                Ativa
              </span>

              @if (carregando() === org.idOrganizacao) {

                <lucide-icon
                  [img]="loaderIcon"
                  class="animate-spin h-4 w-4 text-[var(--color-primary-soft)]" />

              } @else {

                <lucide-icon
                  [img]="chevronRightIcon"
                  class="w-4 h-4
                         text-[var(--color-text-faint)]
                         group-hover:text-[var(--color-primary-soft)]
                         transition-colors" />
              }
            </div>
          </div>
        </button>
      }
    </div>

    <!-- Error -->
    @if (erro()) {

      <div class="mt-4
                  bg-[var(--color-danger-bg)]
                  border border-[var(--color-danger-border)]
                  rounded-xl px-4 py-3">

        <p class="text-[var(--color-danger)] text-sm">
          {{ erro() }}
        </p>
      </div>
    }

    <!-- Logout -->
    <div class="text-center mt-6">

      <button
        (click)="authService.logout()"

        class="text-[var(--color-text-subtle)]
               hover:text-[var(--color-text)]
               text-sm transition-colors">

        Sair da conta
      </button>
    </div>
  </div>
</div>
