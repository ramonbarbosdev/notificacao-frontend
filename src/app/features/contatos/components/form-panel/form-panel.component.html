<app-side-panel [open]="open()" [title]="isEdit() ? 'Editar contato' : 'Novo contato'"
  description="Registre consentimento ou bloqueie um destinatário antes de permitir envios." size="md"
  (closed)="closed.emit()">

<app-form-select
  label="Canal"
  [control]="getControl('canal')"
  [options]="canaisOptions()"
  [error]="campoErro('canal')"
  (changed)="canalChange.emit()"
/>

<app-form-input
  label="Nome do contato"
  [control]="getControl('nmContato')"
  placeholder="Informe o nome do contato"
  [error]="campoErro('nmContato')"
/>

<app-form-input
  label="Telefone ou identificador"
  [control]="getControl('destinatario')"
  [type]="tipoInputDestinatario()"
  [placeholder]="placeholderDestinatario()"
  [helper]="helperDestinatario()"
  [error]="campoErro('destinatario')"
  (inputChanged)="destinatarioInput.emit($event)"
/>

<app-form-textarea
  label="Motivo do bloqueio"
  [control]="getControl('motivo')"
  placeholder="Obrigatório apenas ao bloquear."
  [rows]="3"
  [error]="campoErro('motivo')"
/>

  <div class="grid grid-cols-1 gap-3 pt-2">

    <button type="button" (click)="registrarConsentimento.emit()" [disabled]="acaoAtual() !== null"
      class="bg-[var(--color-success)] hover:brightness-110 disabled:opacity-50 disabled:cursor-not-allowed text-[var(--color-bg-base)] font-semibold py-3 rounded-xl text-sm flex items-center justify-center gap-2">

      @if (acaoAtual() === 'consentimento') {

      <lucide-icon [img]="loaderIcon" class="w-4 h-4 animate-spin" />

      } @else {

      <lucide-icon [img]="shieldIcon" class="w-4 h-4" />

      }

      Registrar consentimento

    </button>

    <button type="button" (click)="bloquearContato.emit()" [disabled]="acaoAtual() !== null"
      class="bg-[var(--color-danger-bg)] border border-[var(--color-danger-border)] disabled:opacity-50 disabled:cursor-not-allowed text-[var(--color-danger)] font-semibold py-3 rounded-xl text-sm flex items-center justify-center gap-2">

      @if (acaoAtual() === 'bloqueio') {

      <lucide-icon [img]="loaderIcon" class="w-4 h-4 animate-spin" />

      } @else {

      <lucide-icon [img]="banIcon" class="w-4 h-4" />

      }

      Bloquear contato

    </button>

  </div>


  @if (resposta()) {

  <div class="mt-5 bg-[var(--color-success-bg)] border border-[var(--color-success-border)] rounded-xl px-4 py-3">

    <p class="text-[var(--color-success)] text-sm">
      Contato atualizado com sucesso.
    </p>

  </div>

  }

  @if (erro()) {

  <div class="mt-5 bg-[var(--color-danger-bg)] border border-[var(--color-danger-border)] rounded-xl px-4 py-3">

    <p class="text-[var(--color-danger)] text-sm">
      {{ erro() }}
    </p>

  </div>

  }

</app-side-panel>
