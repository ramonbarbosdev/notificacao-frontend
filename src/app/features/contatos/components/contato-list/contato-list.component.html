<div class="flex items-start justify-between gap-4 mb-8">
  <div>
    <h1 class="text-2xl font-bold text-[var(--color-text)]">
      Contatos
    </h1>

    <p class="text-[var(--color-text-muted)] text-sm mt-1">
      Central de consentimento, bloqueio e contatos sincronizados por canal.
    </p>
  </div>

  <div class="flex items-center gap-3">
    <input
      #arquivoContatos
      type="file"
      accept=".json,application/json"
      class="hidden"
      (change)="importar.emit($event)"
    />

    <button
      type="button"
      (click)="novoContato.emit()"
      class="border border-[var(--color-border)] text-[var(--color-text)] hover:bg-[var(--color-surface)] font-semibold px-4 py-3 rounded-xl text-sm flex items-center gap-2"
    >
      Novo contato
    </button>

    <button
      type="button"
      (click)="arquivoContatos.click()"
      [disabled]="acaoAtual() !== null"
      class="border border-[var(--color-border)] text-[var(--color-text)] hover:bg-[var(--color-surface)] disabled:opacity-50 disabled:cursor-not-allowed font-semibold px-4 py-3 rounded-xl text-sm flex items-center gap-2"
    >
      @if (acaoAtual() === 'import') {
        <lucide-icon [img]="loaderIcon" class="w-4 h-4 animate-spin" />
      } @else {
        <lucide-icon [img]="importIcon" class="w-4 h-4" />
      }

      Importar
    </button>

    <button
      type="button"
      (click)="exportar.emit()"
      [disabled]="acaoAtual() !== null"
      class="border border-[var(--color-border)] text-[var(--color-text)] hover:bg-[var(--color-surface)] disabled:opacity-50 disabled:cursor-not-allowed font-semibold px-4 py-3 rounded-xl text-sm flex items-center gap-2"
    >
      @if (acaoAtual() === 'export') {
        <lucide-icon [img]="loaderIcon" class="w-4 h-4 animate-spin" />
      } @else {
        <lucide-icon [img]="exportIcon" class="w-4 h-4" />
      }

      Exportar
    </button>

    <button
      type="button"
      (click)="sincronizar.emit()"
      [disabled]="acaoAtual() !== null"
      class="bg-[var(--color-primary)] hover:brightness-110 disabled:opacity-50 disabled:cursor-not-allowed text-[var(--color-bg-base)] font-semibold px-4 py-3 rounded-xl text-sm flex items-center gap-2"
    >
      @if (acaoAtual() === 'sync') {
        <lucide-icon [img]="loaderIcon" class="w-4 h-4 animate-spin" />
      } @else {
        <lucide-icon [img]="syncIcon" class="w-4 h-4" />
      }

      Sincronizar WhatsApp
    </button>
  </div>
</div>

@if (mensagemImportacao()) {
  <div
    class="mb-6 bg-[var(--color-success-bg)] border border-[var(--color-success-border)] rounded-xl px-4 py-3"
  >
    <p class="text-[var(--color-success)] text-sm">
      {{ mensagemImportacao() }}
    </p>
  </div>
}

@if (erro()) {
  <div
    class="mb-6 bg-[var(--color-danger-bg)] border border-[var(--color-danger-border)] rounded-xl px-4 py-3"
  >
    <p class="text-[var(--color-danger)] text-sm">
      {{ erro() }}
    </p>
  </div>
}

<div class="space-y-6">
  <app-data-table
    [columns]="columns()"
    [items]="contatos()"
    [loading]="table().loading()"
    [page]="table().paginaAtual()"
    [pageSize]="table().tamanhoPagina()"
    [totalElements]="table().totalElementos()"
    [totalPages]="table().totalPaginas()"
    (filterChange)="filterChange.emit($event)"
    (nextPage)="nextPage.emit()"
    (previousPage)="previousPage.emit()"
    (pageSizeChange)="pageSizeChange.emit($event)"
  />
</div>
